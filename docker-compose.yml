services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cashregister
      POSTGRES_USER: cashregister
      POSTGRES_PASSWORD: cashregister
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashregister -d cashregister"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    pull_policy: build
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/cashregister
      DATABASE_USER: cashregister
      DATABASE_PASSWORD: cashregister
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
